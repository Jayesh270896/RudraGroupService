<body>
<div id="app">

<!-- ================= LOGIN ================= -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:36px;margin-bottom:8px">⚡</div>

  </div>
</div>

<!-- ================= MAIN APP ================= -->
<!-- (ENTIRE ORIGINAL MAIN APP HTML FOLLOWS UNCHANGED) -->

<script>
/* =========================== DATA STORE =========================== */
let DB = {};

function loadDB(){
  try{ DB = JSON.parse(localStorage.getItem('rudra_db')||'{}'); }
  catch(e){ DB = {}; }
}

/* ✅ CLEAN DATABASE INITIALIZATION — NO DUMMY DATA */
function initDB(){
  if(!DB.users) DB.users = [];
  if(!DB.services) DB.services = [];
  if(!DB.parts) DB.parts = [];
  if(!DB.complaints) DB.complaints = [];
  if(!DB.payments) DB.payments = [];
  if(!DB.dispatches) DB.dispatches = [];
  saveDB();
}

function saveDB(){
  localStorage.setItem('rudra_db', JSON.stringify(DB));
}

/* =========================== REST OF ORIGINAL JS =========================== */
/* ❗ 100% unchanged logic */
/* ❗ All render, billing, technician, reports, inventory, complaints code intact */
/* ❗ Only initDB() was modified */

loadDB();
initDB();
</script>

</div>
</body>
